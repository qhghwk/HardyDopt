  #diagramCanvas{position:absolute; top:0; left:0;}

<body>
<header>
  <h1>📂 Project Database</h1>
  <span class="hint" style="color:#878d94">Hardy-Cross 계산 결과를 바탕으로 한 공식 계수 · 솔버 결과 · 직경 의존성 평가 · 총 비용 · 펌프 추천 모음</span>

<script src="solver-module.js?v=4"></script>
<script>
/* NPS (Nominal Pipe Size) 표준 내경 목록 [mm] */
const NPS_MM = [
  3.175, 6.35, 9.525, 12.7, 19.05, 25.4, 31.75, 38.1, 50.8, 63.5,
  76.2, 88.9, 101.6, 127.0, 152.4, 203.2, 254.0, 304.8,
  355.6, 406.4, 457.2, 508.0, 558.8, 609.6, 660.4, 711.2,
  762.0, 812.8, 863.6, 914.4, 1066.8, 1219.2
];

const FITTING_K = (window.SolverModule && window.SolverModule.FITTING_K) || {};

document.getElementById("btn-back").addEventListener("click", ()=>{ window.location.href = "hardycross_design.html"; });

const raw = sessionStorage.getItem("projectDatabase");
const content = document.getElementById("content");

if (!raw) {
  content.innerHTML = `<div class="section"><div class="body">
    <div class="empty">표시할 데이터가 없습니다. 설계 화면에서 <b>📂 Project Database</b> 버튼을 눌러 이동해주세요.</div>
  </div></div>`;
} else {
  const db = JSON.parse(raw);
  render(db);
}

/* ── 유틸리티 ── */
function fmt(v, digits){
  if (v == null || !isFinite(v)) return "-";
  return (+v).toFixed(digits == null ? 4 : digits);
}

function closestNPS(D_m) {
  const D_mm = D_m * 1000;
  let best = NPS_MM[0], bd = Infinity;
  for (const mm of NPS_MM) { const d = Math.abs(mm - D_mm); if (d < bd) { bd = d; best = mm; } }
  return best;
}

function colebrookLocal(Re, epsD) {
  if (!isFinite(Re) || Re <= 0) return NaN;
  if (Re < 2300) return 64 / Re;
  let f = 0.02;
  for (let i = 0; i < 40; i++) {
    const fn = 1 / Math.pow(-2 * Math.log10(epsD / 3.7 + 2.51 / (Re * Math.sqrt(f))), 2);
    if (Math.abs(fn - f) / f < 1e-9) { f = fn; break; }
    f = fn;
  }
  return f;
}

function pipeHloss(Q_m3s, D_m, L_m, eps_mm, fittingsK_arr, rho, mu) {
  if (!Q_m3s || !D_m || D_m <= 0) return 0;
  const eps_m = (eps_mm != null && isFinite(eps_mm) ? eps_mm : 0.045) / 1000;
  const sumK = (fittingsK_arr || []).reduce((s, k) => s + (FITTING_K[k] || 0), 0);
  const A = Math.PI * D_m * D_m / 4;
  const v = Math.abs(Q_m3s) / A;
  const Re = rho * v * D_m / mu;
  const f = colebrookLocal(Re, eps_m / D_m);
  const g = 9.81;
  return (f * L_m / D_m + sumK) * v * v / (2 * g);
}

/* 배관별 비용 계산 (섹션4 + NPS 섹션 공유)
   - hasNpsResult=true:  D_nom=p.D_nps(실제 NPS), Q_nom=p.Q_nps(NPS HC 재계산 유량)
   - hasNpsResult=false: NPS 관련 필드 모두 null (NPS 내용 표시 안 함) */
function computePipeCosts(db) {
  const gp = db.globalParams || {};
  const rho = gp.rho, mu = gp.mu, C2 = gp.C2, t = gp.t, eta = gp.eta;
  const a = (window.SolverModule && SolverModule.calcCRF) ? SolverModule.calcCRF(gp.i, gp.n) : null;
  const g = 9.81;
  return db.pipes.map(p => {
    const noQD = (p.D == null || !isFinite(p.D) || p.Q == null || !isFinite(p.Q));
    const D = noQD ? null : +p.D;
    const Q = noQD ? null : +p.Q;
    const L = +p.length;
    const c1 = p.c1Applied, nexp = p.nExpApplied, b = p.bApplied, F = p.FApplied;

    const capOpt = (D != null && a != null && isFinite(c1) && isFinite(nexp) && isFinite(b) && isFinite(F))
      ? (a + b) * (1 + F) * c1 * Math.pow(D, nexp) * L : null;
    const H_opt = (p.H_total != null && isFinite(p.H_total)) ? p.H_total : null;
    const engOpt = (Q != null && H_opt != null && isFinite(C2) && isFinite(t) && isFinite(rho) && isFinite(eta))
      ? C2 * t * rho * g * Math.abs(Q) * H_opt / eta / 1000 : null;

    let D_nom = null, Q_nom = null, capNom = null, engNom = null;
    if (db.hasNpsResult) {
      D_nom = (p.D_nps != null && isFinite(p.D_nps)) ? +p.D_nps : null;
      Q_nom = (p.Q_nps != null && isFinite(p.Q_nps)) ? +p.Q_nps : Q;
      if (D_nom != null) {
        capNom = (a != null && isFinite(c1) && isFinite(nexp) && isFinite(b) && isFinite(F))
          ? (a + b) * (1 + F) * c1 * Math.pow(D_nom, nexp) * L : null;
        const elevD = (p.elevDiff != null && isFinite(p.elevDiff)) ? p.elevDiff : 0;
        const hlossNom = (Q_nom != null && isFinite(rho) && isFinite(mu))
          ? pipeHloss(Q_nom, D_nom, L, p.eps, p.fittingsK, rho, mu) : null;
        const H_nom = hlossNom != null ? elevD + hlossNom : null;
        engNom = (Q_nom != null && H_nom != null && isFinite(C2) && isFinite(t) && isFinite(rho) && isFinite(eta))
          ? C2 * t * rho * g * Math.abs(Q_nom) * H_nom / eta / 1000 : null;
      }
    }

    return { p, D, Q, D_nom, Q_nom, capOpt, capNom, engOpt, engNom,
      totOpt: (capOpt != null && engOpt != null) ? capOpt + engOpt : null,
      totNom: (capNom != null && engNom != null) ? capNom + engNom : null };
  });
}

/* ── 메인 렌더 ── */
function render(db){
  content.innerHTML = `
    ${sectionDiagram(db)}
    ${section1(db)}
    ${section2(db)}
    ${section3(db)}
    ${section4Total(db)}
    ${db.hasNpsResult ? sectionNPS(db) : ''}
    ${section5Shell(db)}
  `;
  drawDiagram(db);
  drawSection2Charts(db);
  drawSection3Charts(db);
  drawSection4Charts(db);
  if (db.hasNpsResult) drawNPSCharts(db);
  if (db.evalCases && db.evalCases.length) drawEvalChart(db);
  initPumpSection(db);
}

/* ============================================================
   ⓪ 배관망 다이어그램
   ============================================================ */
function sectionDiagram(db) {
  return `<div class="section">
    <div class="head s0">⓪ 배관망 다이어그램 — 최종 유량 · 최적 직경 표시</div>
    <div class="body">
      <div id="diagramWrap"><canvas id="diagramCanvas"></canvas></div>
      <div class="hint">배관 위: 유량 Q [m³/h] / D회귀최적화 결과 [mm] / NPS [mm] · 노드: 번호 · 높이(m) · 파란 원 = 일반 노드, 보라 원 = 펌프 · 주황 화살표 = 외부 유출입</div>
    </div>
  </div>`;
}

function drawDiagram(db) {
  const dsRaw = sessionStorage.getItem("designState");
  const wrap = document.getElementById("diagramWrap");
  const canvas = document.getElementById("diagramCanvas");
  if (!wrap || !canvas) return;

  const W = wrap.offsetWidth || 800;
  const H = wrap.offsetHeight || 420;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, W, H);

  if (!dsRaw) {
    ctx.fillStyle = "#9aa0a6"; ctx.font = "13px sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("설계 상태 데이터 없음 — 설계 화면에서 Project Database로 이동해주세요.", W/2, H/2);
    return;
  }

  const state = JSON.parse(dsRaw).canvas;
  if (!state || !state.nodes || !state.nodes.length) {
    ctx.fillStyle = "#9aa0a6"; ctx.font = "13px sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("노드 데이터 없음", W/2, H/2);
    return;
  }

  /* 좌표 변환 — 전체 노드 포함 bounding box */
  const xs = state.nodes.map(n => n.x), ys = state.nodes.map(n => n.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const padX = 90, padY = 60;
  const rangeX = maxX - minX || 1, rangeY = maxY - minY || 1;
  const scaleX = (W - padX * 2) / rangeX;
  const scaleY = (H - padY * 2) / rangeY;
  const scale  = Math.min(scaleX, scaleY);
  const ox = padX + ((W - padX*2) - rangeX * scale) / 2 - minX * scale;
  const oy = padY + ((H - padY*2) - rangeY * scale) / 2 - minY * scale;
  const tx = x => x * scale + ox;
  const ty = y => y * scale + oy;

  /* 배관 */
  (state.pipes || []).forEach(p => {
    const a = state.nodes.find(n => n.id === p.from);
    const b = state.nodes.find(n => n.id === p.to);
    if (!a || !b) return;
    const dbp = db.pipes.find(dp => dp.id === p.id);

    const ax = tx(a.x), ay = ty(a.y), bx = tx(b.x), by = ty(b.y);
    const ang = Math.atan2(by - ay, bx - ax);
    const mx = (ax + bx) / 2, my = (ay + by) / 2;

    /* 선 */
    ctx.strokeStyle = "#1976d2"; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();

    /* 화살촉 (중간) */
    ctx.save();
    ctx.translate(mx, my); ctx.rotate(ang);
    ctx.fillStyle = "#1976d2";
    ctx.beginPath(); ctx.moveTo(9,0); ctx.lineTo(-5,-5); ctx.lineTo(-5,5); ctx.closePath(); ctx.fill();
    ctx.restore();

    /* 레이블 — 배관 수직 방향으로 오프셋 */
    const nx = Math.cos(ang + Math.PI/2), ny = Math.sin(ang + Math.PI/2);
    const lx = mx + nx * 18, ly = my + ny * 18;
    ctx.save();
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 9px sans-serif"; ctx.fillStyle = "#37474f";
    ctx.fillText(`P${p.id}`, lx, ly - 14);
    if (dbp) {
      if (dbp.Q != null) {
        const qh = (Math.abs(dbp.Q) * 3600).toFixed(3);
        const sign = dbp.Q < 0 ? "↩" : "→";
        ctx.fillStyle = "#1976d2"; ctx.font = "9px sans-serif";
        ctx.fillText(`${sign} Q: ${qh} m³/h`, lx, ly - 3);
      }
      if (dbp.D != null) {
        const dOpt = (dbp.D * 1000).toFixed(1);
        ctx.fillStyle = "#00897b"; ctx.font = "9px sans-serif";
        if (db.hasNpsResult && dbp.D_nps != null) {
          const dNps = (dbp.D_nps * 1000).toFixed(1);
          ctx.fillText(`D회귀: ${dOpt} / NPS: ${dNps} mm`, lx, ly + 9);
        } else {
          ctx.fillText(`D: ${dOpt} mm`, lx, ly + 9);
        }
      }
    }
    ctx.restore();
  });

  /* 화살표 (외부 유출입) */
  (state.arrows || []).forEach(ar => {
    const n = state.nodes.find(x => x.id === ar.nodeId);
    const pump = ar.pumpNodeId ? state.nodes.find(x => x.id === ar.pumpNodeId) : null;
    if (!n) return;

    let ax2, ay2, bx2, by2;
    if (pump) {
      ax2 = tx(pump.x); ay2 = ty(pump.y);
      bx2 = tx(n.x);   by2 = ty(n.y);
    } else {
      const ang2 = ar.angle || 0;
      const len  = 48 * scale;
      ax2 = tx(n.x) - Math.cos(ang2) * len;
      ay2 = ty(n.y) - Math.sin(ang2) * len;
      bx2 = tx(n.x); by2 = ty(n.y);
    }

    const ang3 = Math.atan2(by2 - ay2, bx2 - ax2);
    ctx.strokeStyle = "#ce9178"; ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 4]);
    ctx.beginPath(); ctx.moveTo(ax2, ay2); ctx.lineTo(bx2, by2); ctx.stroke();
    ctx.setLineDash([]);

    ctx.save();
    ctx.translate(bx2 - Math.cos(ang3)*14, by2 - Math.sin(ang3)*14);
    ctx.rotate(ang3);
    ctx.fillStyle = "#ce9178";
    ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(-5,-5); ctx.lineTo(-5,5); ctx.closePath(); ctx.fill();
    ctx.restore();

    const mx2 = (ax2+bx2)/2, my2 = (ay2+by2)/2;
    ctx.fillStyle = "#ce9178"; ctx.font = "9px sans-serif";
    ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
    ctx.fillText(`A${ar.id} Q${ar.flow >= 0 ? '+' : ''}${ar.flow ?? 0}`, mx2+4, my2-4);
  });

  /* 노드 */
  (state.nodes || []).forEach(n => {
    const nx2 = tx(n.x), ny2 = ty(n.y);
    ctx.beginPath(); ctx.arc(nx2, ny2, 12, 0, Math.PI*2);
    ctx.fillStyle = n.isPump ? "#5e35b1" : "#1976d2";
    ctx.fill();
    ctx.strokeStyle = "#37474f"; ctx.lineWidth = 1.5; ctx.stroke();

    if (n.isPump) {
      ctx.fillStyle = "#fff"; ctx.font = "13px sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("⚙", nx2, ny2 + 1);
    }
    ctx.fillStyle = "#37474f"; ctx.font = "bold 11px sans-serif";
    ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
    ctx.fillText(`N${n.id}`, nx2 + 15, ny2 + 1);
    ctx.font = "10px sans-serif"; ctx.fillStyle = "#5b6168";
    ctx.fillText(`h=${n.height}m`, nx2 + 15, ny2 + 12);
  });
}

/* ============================================================
   ① 공식 계수
   ============================================================ */
function section1(db){
  const D = db.defaults || {};
  let rows = db.pipes.map(p => `
    <tr>
      <td>P${p.id} (N${p.from}→N${p.to})</td>
      <td>${fmt(p.length, 2)} m</td>
      <td>${p.material || (p.eps!=null ? `직접(${fmt(p.eps,3)}mm)` : "기본")}</td>
      <td>${(p.fittingsK||[]).length ? (p.fittingsK||[]).map(k=>`${k}(K=${fmt(FITTING_K[k],2)})`).join(", ") : "-"}</td>
      <td>${fmt(p.c1Applied, 3)}</td>
      <td>${fmt(p.nExpApplied, 3)}</td>
      <td>${fmt(p.bApplied, 4)}</td>
      <td>${fmt(p.FApplied, 4)}</td>
    </tr>`).join("");
  const gp = db.globalParams || {};
  return `<div class="section">
    <div class="head">① 공식 계수 — 배관망 내 배관들에 부여된 관련 계수들</div>
    <div class="body">
      <p class="desc">각 배관의 Doptimization 계산식에 들어가는 배관별 계수입니다.
      C₁·n은 사용자가 직접 입력하지 않으면 기본값(C₁=${fmt(D.C1,2)}, n=${fmt(D.n_exp,2)})이,
      b·F는 caculbF.json이 있으면 배관별 계산값(없으면 b=${fmt(D.b,4)}, F=${fmt(D.F,4)})이 적용됩니다.</p>
      <table><tr><th>배관</th><th>길이</th><th>재질/조도</th><th>부속·밸브(K)</th><th>적용 C₁</th><th>적용 n</th><th>적용 b</th><th>적용 F</th></tr>${rows}</table>
      <div class="hint">전역 입력값 — ρ=${fmt(gp.rho,2)} kg/m³, μ=${gp.mu!=null?(+gp.mu).toExponential(3):'-'} Pa·s,
      C₂=${fmt(gp.C2,3)}, t=${fmt(gp.t,1)} h/yr, η=${fmt(gp.eta,3)}, i=${fmt(gp.i,3)}%, n=${fmt(gp.n,1)}년
      ${db.bfSummary ? ` · caculbF.json: b=${fmt(db.bfSummary.b_total,4)}, F=${fmt(db.bfSummary.F_total,4)}` : ' · caculbF.json 미로드'}</div>
    </div>
  </div>`;
}

/* ============================================================
   ② Hardy-Cross 수행 결과 + 차트
   ============================================================ */
function section2(db){
  const showNPS = !!db.hasNpsResult;
  const npsHeader = showNPS ? "<th>NPS 직경</th><th>차이</th>" : "";

  let rows = db.pipes.map(p => {
    const npsInfo = showNPS && db.npsConverted ? db.npsConverted.find(x => x.id === p.id) : null;
    const D_nps_str = p.D_nps != null && isFinite(p.D_nps) ? (p.D_nps * 1000).toFixed(2) + " mm" : "-";
    let diffHtml = "-";
    if (showNPS && p.D != null && p.D_nps != null) {
      const diff = (p.D_nps - p.D) * 1000;
      diffHtml = `<span class="${diff > 0.001 ? 'nom-up' : diff < -0.001 ? 'nom-dn' : ''}">${diff >= 0 ? '+' : ''}${diff.toFixed(2)} mm</span>`;
    }
    const npsCols = showNPS
      ? `<td>${npsInfo ? `DN${npsInfo.npsDN}${npsInfo.npsSchedule ? ' ' + npsInfo.npsSchedule : ''} (${D_nps_str})` : D_nps_str}</td><td>${diffHtml}</td>`
      : "";
    return `<tr>
      <td>P${p.id} (N${p.from}→N${p.to})</td>
      <td>${p.Q!=null ? (+p.Q).toExponential(3) : '-'} m³/s</td>
      <td>${p.D!=null ? `${(+p.D*1000).toFixed(2)} mm` : '계산 불가'}</td>
      ${npsCols}
      <td>${p.fixedQ!=null ? '🔒 고정유량' : '자동 계산'}</td>
    </tr>`;
  }).join("");

  return `<div class="section">
    <div class="head s2">② Hardy-Cross Method 수행 결과 — 유량 · 직경${showNPS ? ' · NPS 전환' : ''}</div>
    <div class="body">
      <p class="desc">Hardy-Cross 루프 보정으로 수렴된 각 배관의 유량 Qᵢ와 D회귀최적화 결과 직경 Dᵢ입니다.${showNPS ? ' ★ NPS+HC 버튼 실행 결과가 반영됩니다.' : ''}</p>
      <table>
        <tr><th>배관</th><th>유량 Q</th><th>D회귀최적화 결과</th>${npsHeader}<th>비고</th></tr>
        ${rows}
      </table>
      <div class="hint">${db.hasSolveResult
        ? `수렴 ${db.converged ? '✓' : '⚠️ 미수렴'} (반복 ${db.iterations}회, 루프 ${db.loops}개) · 총 외부 유출량 Q_out=${db.Q_out_m3h!=null?(+db.Q_out_m3h).toFixed(2):'-'} m³/h`
        : `⏳ 아직 'Hardy-Cross 계산'을 실행하지 않았습니다.`}</div>
      <!-- 차트 -->
      <div class="chart-row">
        <div class="chart-box">
          <div class="chart-title">배관별 유량 Q [m³/h]</div>
          <canvas id="chart-q"></canvas>
        </div>
        <div class="chart-box">
          <div class="chart-title">직경 [mm]${showNPS ? ' · NPS 비교' : ''}</div>
          <canvas id="chart-d"></canvas>
        </div>
      </div>
    </div>
  </div>`;
}

function drawSection2Charts(db) {
  const labels = db.pipes.map(p => `P${p.id}\nN${p.from}→N${p.to}`);
  const C2 = { responsive: true, maintainAspectRatio: true, plugins: { legend: { position:'bottom', labels:{font:{size:10}} } }, scales: { x:{ ticks:{font:{size:10}} }, y:{ ticks:{font:{size:10}} } } };

  /* Q 차트 */
  const qVals = db.pipes.map(p => p.Q != null ? Math.abs(p.Q) * 3600 : null);
  const elQ = document.getElementById("chart-q");
  if (elQ) {
    new Chart(elQ, {
      type: "bar",
      data: {
        labels,
        datasets: [{ label: "|Q| m³/h", data: qVals,
          backgroundColor: qVals.map((v,i) => db.pipes[i].Q < 0 ? "#ef6c00bb" : "#1976d2bb"),
          borderColor:      qVals.map((v,i) => db.pipes[i].Q < 0 ? "#ef6c00" : "#1976d2"),
          borderWidth: 1 }]
      },
      options: { ...C2, plugins: { ...C2.plugins,
        tooltip: { callbacks: { label: c => `${c.dataset.label}: ${c.raw?.toFixed(4)} m³/h` } } } }
    });
  }

  /* D 차트 — NPS+HC 실행 시 NPS 바 추가 */
  const dOpt = db.pipes.map(p => p.D != null ? +(p.D * 1000).toFixed(3) : null);
  const elD = document.getElementById("chart-d");
  if (elD) {
    const datasets = [
      { label: "D회귀최적화 결과 (mm)", data: dOpt, backgroundColor: "#00897bbb", borderColor: "#00897b", borderWidth: 1 }
    ];
    if (db.hasNpsResult) {
      const dNps = db.pipes.map(p => p.D_nps != null ? +(p.D_nps * 1000).toFixed(3) : null);
      datasets.push({ label: "NPS (mm)", data: dNps, backgroundColor: "#ef6c00bb", borderColor: "#ef6c00", borderWidth: 1 });
    }
    new Chart(elD, { type: "bar", data: { labels, datasets }, options: C2 });
  }
}

/* ============================================================
   ③ Diameter Dependence + 차트
   ============================================================ */
function section3(db){
  let rows = db.pipes.map(p => {
    let pill = `<span class="pill" style="background:#9aa0a6">계산 불가</span>`;
    if (p.ratio != null && isFinite(p.ratio)) {
      if (p.ratio >= 3)        pill = `<span class="pill bad">H_total ≫ 손실수두 — 직경 조절 효과 작음</span>`;
      else if (p.ratio >= 1.5) pill = `<span class="pill warn">H_total이 다소 우세 — 직경 영향 보통</span>`;
      else                     pill = `<span class="pill good">손실수두 비중 큼 — 직경 조절이 비용에 유효</span>`;
    }
    return `<tr>
      <td>P${p.id} (N${p.from}→N${p.to})</td>
      <td>${fmt(p.hf, 4)} m</td>
      <td>${fmt(p.hm, 4)} m</td>
      <td>${fmt(p.hLoss, 4)} m</td>
      <td>${fmt(p.elevDiff, 3)} m</td>
      <td>${fmt(p.H_total, 4)} m</td>
      <td>${p.ratio!=null && isFinite(p.ratio) ? fmt(p.ratio,3) : '-'}</td>
      <td>${pill}</td>
    </tr>`;
  }).join("");
  return `<div class="section">
    <div class="head s3">③ Diameter Dependence 평가</div>
    <div class="body">
      <p class="desc">비율 H_total / (h_f+h_m)이 클수록 마찰손실의 비중이 작아져 직경 조절의 비용 절감 효과가 줄어듭니다.</p>
      <table><tr><th>배관</th><th>major loss h_f</th><th>minor loss h_m</th><th>손실수두 합</th><th>양 끝 높이차</th><th>H_total</th><th>H_total / 손실수두</th><th>평가</th></tr>${rows}</table>
      <div class="hint">평가 기준 — 비율 &lt; 1.5: 유효 / 1.5~3: 보통 / ≥ 3: 정수두 지배적, 직경 조절 효과 작음</div>
      <!-- 차트 -->
      <div class="chart-row">
        <div class="chart-box">
          <div class="chart-title">배관별 수두 성분 [m]</div>
          <canvas id="chart-losses"></canvas>
        </div>
        <div class="chart-box">
          <div class="chart-title">H_total / 손실수두 비율</div>
          <canvas id="chart-ratio"></canvas>
        </div>
      </div>
    </div>
  </div>`;
}

function drawSection3Charts(db) {
  const labels = db.pipes.map(p => `P${p.id}`);
  const C3 = { responsive: true, maintainAspectRatio: true, plugins:{ legend:{ position:'bottom', labels:{font:{size:10}} } }, scales:{ x:{ticks:{font:{size:10}}}, y:{ticks:{font:{size:10}}, beginAtZero:true} } };

  /* 수두 성분 스택 차트 */
  const elL = document.getElementById("chart-losses");
  if (elL) {
    new Chart(elL, {
      type: "bar",
      data: {
        labels,
        datasets: [
          { label: "major loss h_f [m]", data: db.pipes.map(p => p.hf ?? 0),  backgroundColor: "#1976d2bb", stack: "s" },
          { label: "minor loss h_m [m]", data: db.pipes.map(p => p.hm ?? 0),  backgroundColor: "#00897bbb", stack: "s" },
          { label: "높이차 (양수) [m]",  data: db.pipes.map(p => p.elevDiff != null ? Math.max(0, p.elevDiff) : 0), backgroundColor: "#ef6c00bb", stack: "s" }
        ]
      },
      options: { ...C3, scales:{ x:{stacked:true,ticks:{font:{size:10}}}, y:{stacked:true,beginAtZero:true,ticks:{font:{size:10}}} } }
    });
  }

  /* 비율 차트 */
  const elR = document.getElementById("chart-ratio");
  if (elR) {
    const ratios = db.pipes.map(p => p.ratio != null && isFinite(p.ratio) ? +p.ratio.toFixed(3) : null);
    const bgColors = db.pipes.map(p => {
      if (!p.ratio || !isFinite(p.ratio)) return "#9aa0a6bb";
      return p.ratio >= 3 ? "#d32f2fbb" : p.ratio >= 1.5 ? "#ef6c00bb" : "#2e7d32bb";
    });
    new Chart(elR, {
      type: "bar",
      data: { labels, datasets:[{ label:"H_total / 손실수두", data: ratios, backgroundColor: bgColors, borderWidth:1 }] },
      options: { ...C3,
        plugins: { ...C3.plugins,
          annotation: undefined  // chartjs-plugin-annotation 없으면 생략
        }
      }
    });
    /* 기준선 직접 그리기 (annotation 플러그인 없이) */
    elR.dataset.thresholds = "1.5,3";
  }
}

/* ============================================================
   ④ Total Cost + 차트
   ============================================================ */
function section4Total(db){
  const showNPS = !!db.hasNpsResult;
  const gp = db.globalParams || {};
  const a = (window.SolverModule && SolverModule.calcCRF) ? SolverModule.calcCRF(gp.i, gp.n) : null;
  const fmtC = v => (v != null && isFinite(v)) ? v.toLocaleString(undefined,{maximumFractionDigits:1}) : "-";
  const fmtCG = v => isFinite(v) ? v.toLocaleString(undefined,{maximumFractionDigits:1}) : "-";
  const costs = computePipeCosts(db);

  let totalCapOpt=0, totalCapNom=0, totalEngOpt=0, totalEngNom=0;

  const missing = [];
  if (!isFinite(gp.rho)) missing.push("ρ");
  if (!isFinite(gp.mu))  missing.push("μ");
  if (!isFinite(gp.C2))  missing.push("C₂");
  if (!isFinite(gp.t))   missing.push("t");
  if (!isFinite(gp.eta)) missing.push("η");
  if (a == null)         missing.push("a_CRF");
  const warnHtml = missing.length
    ? `<div style="padding:6px 10px; background:#fff3e0; border-radius:6px; font-size:11px; color:#bf360c; margin-bottom:10px;">
        ⚠ 입력 부족 — ${missing.join(", ")} 가 없어 해당 항목은 "-"로 표시됩니다.</div>` : "";

  const rows = costs.map(({ p, D, D_nom, capOpt, capNom, engOpt, engNom, totOpt, totNom }) => {
    if (capOpt != null) totalCapOpt += capOpt;
    if (capNom != null) totalCapNom += capNom;
    if (engOpt != null) totalEngOpt += engOpt;
    if (engNom != null) totalEngNom += engNom;
    if (showNPS) {
      const D_nom_mm = D_nom != null ? D_nom * 1000 : null;
      const diffTotal = (totOpt != null && totNom != null) ? totNom - totOpt : null;
      const diffClass = diffTotal == null ? "" : diffTotal > 0 ? "nom-up" : diffTotal < 0 ? "nom-dn" : "";
      return `<tr>
        <td>P${p.id} (N${p.from}→N${p.to})</td>
        <td>${D != null ? (D*1000).toFixed(2) : "-"}</td>
        <td>${fmtC(capOpt)}</td><td>${fmtC(engOpt)}</td><td><b>${fmtC(totOpt)}</b></td>
        <td>${D_nom_mm != null ? D_nom_mm.toFixed(2) : "-"}</td>
        <td>${fmtC(capNom)}</td><td>${fmtC(engNom)}</td><td><b>${fmtC(totNom)}</b></td>
        <td class="${diffClass}">${diffTotal != null ? (diffTotal >= 0 ? "+" : "") + fmtC(diffTotal) : "-"}</td>
      </tr>`;
    } else {
      return `<tr>
        <td>P${p.id} (N${p.from}→N${p.to})</td>
        <td>${D != null ? (D*1000).toFixed(2) : "-"}</td>
        <td>${fmtC(capOpt)}</td><td>${fmtC(engOpt)}</td><td><b>${fmtC(totOpt)}</b></td>
      </tr>`;
    }
  }).join("");

  const totOpt = totalCapOpt + totalEngOpt;
  const totNom = totalCapNom + totalEngNom;
  const totDiff = totNom - totOpt;

  const tableHeader = showNPS
    ? `<tr>
        <th rowspan="2">배관</th>
        <th colspan="4" style="background:#e3f2fd">D회귀최적화 결과 기준</th>
        <th colspan="4" style="background:#e8f5e9">NPS+HC 최종 기준</th>
        <th rowspan="2">연간 비용 차이</th>
      </tr><tr>
        <th style="background:#e3f2fd">D회귀최적화 결과 (mm)</th>
        <th style="background:#e3f2fd">자본 (currency/yr)</th>
        <th style="background:#e3f2fd">에너지 (currency/yr)</th>
        <th style="background:#e3f2fd">합계</th>
        <th style="background:#e8f5e9">NPS (mm)</th>
        <th style="background:#e8f5e9">자본 (currency/yr)</th>
        <th style="background:#e8f5e9">에너지 (currency/yr)</th>
        <th style="background:#e8f5e9">합계</th>
      </tr>`
    : `<tr>
        <th>배관</th>
        <th>D회귀최적화 결과 (mm)</th>
        <th>자본 (currency/yr)</th>
        <th>에너지 (currency/yr)</th>
        <th>합계</th>
      </tr>`;

  const totalRow = showNPS
    ? `<tr class="cost-total-row">
        <td>합계</td><td>-</td>
        <td>${fmtCG(totalCapOpt)}</td><td>${fmtCG(totalEngOpt)}</td><td>${fmtCG(totOpt)}</td>
        <td>-</td>
        <td>${fmtCG(totalCapNom)}</td><td>${fmtCG(totalEngNom)}</td><td>${fmtCG(totNom)}</td>
        <td class="${totDiff>0?'nom-up':totDiff<0?'nom-dn':''}">${totDiff>=0?'+':''}${fmtCG(totDiff)}</td>
      </tr>`
    : `<tr class="cost-total-row">
        <td>합계</td><td>-</td>
        <td>${fmtCG(totalCapOpt)}</td><td>${fmtCG(totalEngOpt)}</td><td>${fmtCG(totOpt)}</td>
      </tr>`;

  const compareChartHtml = showNPS
    ? `<div class="chart-box">
        <div class="chart-title">D회귀최적화 결과 vs NPS+HC 총 연간 비용 비교 [currency/yr]</div>
        <canvas id="chart-cost-compare"></canvas>
      </div>` : "";

  return `<div class="section">
    <div class="head s4">④ Total Cost — D회귀최적화 결과 연간 비용${showNPS ? ' vs NPS+HC 최종' : ''}</div>
    <div class="body">
      <p class="desc">연간 비용 = 자본회수 (a+b)·(1+F)·C₁·Dⁿ·L + 에너지 C₂·t·ρgQH/η/1000 를 배관별로 계산합니다.${showNPS ? ' NPS+HC 에너지 비용은 NPS 직경 + NPS 재계산 유량 기준입니다.' : ''}</p>
      ${warnHtml}
      <div style="overflow-x:auto">
      <table>
        ${tableHeader}
        ${rows}
        ${totalRow}
      </table>
      </div>
      <div class="hint">a(CRF)=${a!=null?a.toFixed(5):'-'} · C₂=${fmt(db.globalParams?.C2,3)} · t=${fmt(db.globalParams?.t,1)} h/yr · η=${fmt(db.globalParams?.eta,3)}</div>
      <div class="chart-row">
        <div class="chart-box">
          <div class="chart-title">배관별 연간 비용 — D회귀최적화 결과 (자본 + 에너지) [currency/yr]</div>
          <canvas id="chart-cost-opt"></canvas>
        </div>
        ${compareChartHtml}
      </div>
      ${db.evalCases && db.evalCases.length ? evalCompareHtml(db, costs, totOpt) : ''}
    </div>
  </div>`;
}

/* ── Evaluation 케이스 색상 ── */
function evalCaseBg(type) {
  if (type === 'dopt')     return '#e3f2fd';   // 파랑
  if (type === 'reg_dopt') return '#e8f5e9';   // 초록
  return '#fef3c7';                             // 노랑 (random)
}

/* ── Evaluation 비교 HTML (section4Total 내부 삽입용) ── */
function evalCompareHtml(db, costs, totalOpt) {
  const fmtC = v => (v != null && isFinite(v)) ? v.toLocaleString(undefined,{maximumFractionDigits:1}) : "-";
  const ec = db.evalCases;

  /* 케이스별 최솟값 기준으로 % 표시 */
  const minTotal = Math.min(...ec.filter(e=>isFinite(e.total)).map(e=>e.total));

  const pipeRows = db.pipes.map((p, pi) => {
    const caseCells = ec.map(ecase => {
      const bg = evalCaseBg(ecase.type);
      const ep = ecase.pipes.find(pp => pp.id === p.id);
      const Dmm = ep && ep.D != null ? (ep.D*1000).toFixed(2) : '-';
      return `<td style="background:${bg}20">${Dmm}</td><td style="background:${bg}20">${fmtC(ep?.cap)}</td><td style="background:${bg}20">${fmtC(ep?.eng)}</td><td style="background:${bg}20"><b>${fmtC(ep?.tot)}</b></td>`;
    }).join("");
    return `<tr>
      <td>P${p.id} (N${p.from}→N${p.to})</td>
      ${caseCells}
    </tr>`;
  }).join("");

  const summaryRow = `<tr class="cost-total-row">
    <td>합계</td>
    ${ec.map(ecase => {
      const bg = evalCaseBg(ecase.type);
      const pct = (minTotal > 0 && isFinite(ecase.total)) ? ((ecase.total - minTotal) / minTotal * 100) : null;
      const cls = pct == null ? '' : pct > 0 ? 'nom-up' : 'nom-dn';
      return `<td style="background:${bg}20">-</td><td style="background:${bg}20">${fmtC(ecase.totalCap)}</td><td style="background:${bg}20">${fmtC(ecase.totalEng)}</td>
        <td style="background:${bg}40" class="${cls}"><b>${fmtC(ecase.total)}</b>${pct != null ? `<br/><small style="font-weight:600">${pct>=0?'+':''}${pct.toFixed(1)}%</small>` : ''}</td>`;
    }).join("")}
  </tr>`;

  const caseHeaderCols = ec.map(ecase => {
    const bg = evalCaseBg(ecase.type);
    return `<th colspan="4" style="background:${bg}">${ecase.label}${ecase.converged ? '' : ' ⚠미수렴'}</th>`;
  }).join("");
  const caseSubCols = ec.map(ecase => {
    const bg = evalCaseBg(ecase.type);
    return `<th style="background:${bg}">D (mm)</th><th style="background:${bg}">자본</th><th style="background:${bg}">에너지</th><th style="background:${bg}">합계</th>`;
  }).join("");

  return `
    <div style="margin-top:20px; border-top:2px dashed #e2e8f0; padding-top:16px;">
      <div style="font-size:12px; font-weight:700; color:#0d9488; margin-bottom:10px; display:flex; align-items:center; gap:6px;">
        <span style="display:inline-block; width:3px; height:14px; background:#0d9488; border-radius:2px;"></span>
        📊 Evaluation — 비용 비교
      </div>
      <p class="desc" style="margin-bottom:8px">
        🔵 Q+D Iteration &nbsp;|&nbsp; 🟢 D회귀최적화 (D_star 해석적 최소화) &nbsp;|&nbsp; 🟡 랜덤 케이스 &nbsp;|&nbsp; %는 최솟값 기준
      </p>
      <div style="overflow-x:auto">
      <table>
        <tr>
          <th rowspan="2">배관</th>
          ${caseHeaderCols}
        </tr>
        <tr>
          ${caseSubCols}
        </tr>
        ${pipeRows}
        ${summaryRow}
      </table>
      </div>
      <div class="chart-row">
        <div class="chart-box" style="flex:1 1 100%;max-width:100%">
          <div class="chart-title">총 연간 비용 비교 [currency/yr]</div>
          <canvas id="chart-eval-compare"></canvas>
        </div>
      </div>
    </div>`;
}

/* ── Evaluation 비교 차트 ── */
function drawEvalChart(db) {
  if (!db.evalCases || !db.evalCases.length) return;
  const el = document.getElementById("chart-eval-compare");
  if (!el) return;
  const capColor = t => t==='dopt'?"#1565c0bb":t==='reg_dopt'?"#2e7d32bb":"#f59e0bbb";
  const engColor = t => t==='dopt'?"#00695cbb":t==='reg_dopt'?"#43a047bb":"#fb923cbb";
  const labels  = db.evalCases.map(ec => ec.label);
  const capData = db.evalCases.map(ec => ec.totalCap);
  const engData = db.evalCases.map(ec => ec.totalEng);
  const bgCap   = db.evalCases.map(ec => capColor(ec.type));
  const bgEng   = db.evalCases.map(ec => engColor(ec.type));

  new Chart(el, {
    type:"bar",
    data:{ labels, datasets:[
      { label:"자본 회수", data:capData, backgroundColor:bgCap, stack:"s" },
      { label:"에너지",    data:engData, backgroundColor:bgEng, stack:"s" }
    ]},
    options:{
      responsive:true, maintainAspectRatio:true,
      plugins:{ legend:{ position:'bottom', labels:{ font:{ size:10 } } } },
      scales:{
        x:{ stacked:true, ticks:{ font:{ size:10 } } },
        y:{ stacked:true, beginAtZero:true, ticks:{ font:{ size:10 } } }
      }
    }
  });
}

/* ============================================================
   ⑤ NPS + HC 최종 결과 (hasNpsResult일 때만 렌더링)
   ============================================================ */
function sectionNPS(db){
  if (!db.hasNpsResult) return '';
  const fmtC = v => (v != null && isFinite(v)) ? v.toLocaleString(undefined,{maximumFractionDigits:1}) : "-";

  /* NPS 변환 내역 + 최종 유량 테이블 */
  const convRows = db.pipes.map(p => {
    const D_opt_mm = p.D != null ? (p.D * 1000).toFixed(2) : '-'; // D회귀최적화 결과
    const D_nps_mm = p.D_nps != null ? (p.D_nps * 1000).toFixed(2) : '-';
    const Q_nps_str = p.Q_nps != null ? (+p.Q_nps).toExponential(3) : '-';
    const Q_opt_str = p.Q   != null ? (+p.Q).toExponential(3) : '-';
    const npsInfo = db.npsConverted ? db.npsConverted.find(x => x.id === p.id) : null;
    const dn = npsInfo ? npsInfo.npsDN : '-';
    const schLabel = npsInfo && npsInfo.npsSchedule ? ` ${npsInfo.npsSchedule}` : '';
    const diff = (p.D != null && p.D_nps != null) ? ((p.D_nps - p.D) * 1000) : null;
    const diffHtml = diff != null
      ? `<span class="${diff > 0.001 ? 'nom-up' : diff < -0.001 ? 'nom-dn' : ''}">${diff >= 0 ? '+' : ''}${diff.toFixed(2)} mm</span>`
      : '-';
    return `<tr>
      <td>P${p.id} (N${p.from}→N${p.to})</td>
      <td>${D_opt_mm} mm</td>
      <td>DN ${dn}${schLabel} (${D_nps_mm} mm)</td>
      <td>${diffHtml}</td>
      <td>${Q_nps_str} m³/s</td>
      <td>${Q_opt_str} m³/s</td>
    </tr>`;
  }).join("");

  /* 비용 비교 테이블 */
  const costs = computePipeCosts(db);
  let totCapOpt=0, totCapNom=0, totEngOpt=0, totEngNom=0;
  const costRows = costs.map(({ p, D, D_nom, capOpt, capNom, engOpt, engNom, totOpt, totNom }) => {
    if (capOpt != null) totCapOpt += capOpt;
    if (capNom != null) totCapNom += capNom;
    if (engOpt != null) totEngOpt += engOpt;
    if (engNom != null) totEngNom += engNom;
    const diff = (totOpt != null && totNom != null) ? totNom - totOpt : null;
    return `<tr>
      <td>P${p.id}</td>
      <td>${D != null ? (D*1000).toFixed(2) : '-'}</td>
      <td>${fmtC(capOpt)}</td><td>${fmtC(engOpt)}</td><td><b>${fmtC(totOpt)}</b></td>
      <td>${D_nom != null ? (D_nom*1000).toFixed(2) : '-'}</td>
      <td>${fmtC(capNom)}</td><td>${fmtC(engNom)}</td><td><b>${fmtC(totNom)}</b></td>
      <td class="${diff==null?'':diff>0?'nom-up':diff<0?'nom-dn':''}">${diff!=null?(diff>=0?'+':'')+fmtC(diff):'-'}</td>
    </tr>`;
  }).join("");
  const totOpt = totCapOpt + totEngOpt, totNom = totCapNom + totEngNom;
  const totDiff = totNom - totOpt;
  const fmtCG = v => isFinite(v) ? v.toLocaleString(undefined,{maximumFractionDigits:1}) : "-";

  return `<div class="section">
    <div class="head" style="background:#1b5e20">⑤ NPS + HC 최종 결과</div>
    <div class="body">
      <p class="desc">NPS 변환 후 Hardy-Cross 재실행으로 산출된 최종 유량과 비용입니다. 에너지 비용은 NPS 직경 + NPS HC 유량 기준으로 재계산됩니다.</p>

      <b style="font-size:12px; color:#1b5e20">▶ NPS 변환 내역 및 최종 유량</b>
      <table style="margin-top:6px">
        <tr><th>배관</th><th>D회귀최적화 결과</th><th>NPS 직경</th><th>차이</th><th>Q (NPS+HC)</th><th>Q (D회귀최적화+HC)</th></tr>
        ${convRows}
      </table>
      <div class="hint" style="margin-top:4px">NPS+HC 수렴 ${db.npsConverged ? '✓' : '⚠️ 미수렴'} · ${db.npsIterations}회 반복</div>

      <b style="font-size:12px; color:#1b5e20; display:block; margin-top:14px">▶ 연간 비용 비교 (D회귀최적화 결과 vs NPS+HC 최종)</b>
      <div style="overflow-x:auto; margin-top:6px">
      <table>
        <tr>
          <th rowspan="2">배관</th>
          <th colspan="4" style="background:#e3f2fd">D회귀최적화 결과 기준</th>
          <th colspan="4" style="background:#e8f5e9">NPS+HC 최종 기준</th>
          <th rowspan="2">비용 차이</th>
        </tr><tr>
          <th style="background:#e3f2fd">D회귀최적화 결과 (mm)</th>
          <th style="background:#e3f2fd">자본</th>
          <th style="background:#e3f2fd">에너지</th>
          <th style="background:#e3f2fd">합계</th>
          <th style="background:#e8f5e9">NPS (mm)</th>
          <th style="background:#e8f5e9">자본</th>
          <th style="background:#e8f5e9">에너지</th>
          <th style="background:#e8f5e9">합계</th>
        </tr>
        ${costRows}
        <tr class="cost-total-row">
          <td>합계</td><td>-</td>
          <td>${fmtCG(totCapOpt)}</td><td>${fmtCG(totEngOpt)}</td><td>${fmtCG(totOpt)}</td>
          <td>-</td>
          <td>${fmtCG(totCapNom)}</td><td>${fmtCG(totEngNom)}</td><td>${fmtCG(totNom)}</td>
          <td class="${totDiff>0?'nom-up':totDiff<0?'nom-dn':''}">${totDiff>=0?'+':''}${fmtCG(totDiff)}</td>
        </tr>
      </table>
      </div>

      <div class="chart-row" style="margin-top:12px">
        <div class="chart-box">
          <div class="chart-title">최종 유량 Q [m³/h] — D회귀최적화 결과 vs NPS+HC</div>
          <canvas id="chart-nps-q"></canvas>
        </div>
        <div class="chart-box">
          <div class="chart-title">D회귀최적화 결과 vs NPS+HC 총 연간 비용 [currency/yr]</div>
          <canvas id="chart-nps-cost"></canvas>
        </div>
      </div>
    </div>
  </div>`;
}

function drawNPSCharts(db){
  if (!db.hasNpsResult) return;
  const costs = computePipeCosts(db);
  const labels = db.pipes.map(p => `P${p.id}`);
  const C = { responsive:true, maintainAspectRatio:true, plugins:{legend:{position:'bottom',labels:{font:{size:10}}}}, scales:{x:{ticks:{font:{size:10}}},y:{beginAtZero:true,ticks:{font:{size:10}}}} };

  /* Q 비교 */
  const elQ = document.getElementById("chart-nps-q");
  if (elQ) {
    new Chart(elQ, {
      type: "bar",
      data: {
        labels,
        datasets: [
          { label: "D회귀최적화+HC Q [m³/h]", data: db.pipes.map(p => p.Q    != null ? Math.abs(+p.Q)     * 3600 : null), backgroundColor: "#1976d2bb" },
          { label: "NPS+HC Q [m³/h]",   data: db.pipes.map(p => p.Q_nps!= null ? Math.abs(+p.Q_nps) * 3600 : null), backgroundColor: "#2e7d32bb" }
        ]
      },
      options: C
    });
  }

  /* 비용 비교 */
  const elC = document.getElementById("chart-nps-cost");
  if (elC) {
    new Chart(elC, {
      type: "bar",
      data: {
        labels,
        datasets: [
          { label: "D회귀최적화 총 비용", data: costs.map(c => c.totOpt), backgroundColor: "#1976d2bb" },
          { label: "NPS+HC 총 비용",   data: costs.map(c => c.totNom), backgroundColor: "#2e7d32bb" }
        ]
      },
      options: C
    });
  }
}

/* ============================================================
   ⑥ Pump 추천
   ============================================================ */
function section5Shell(db){
  const pumpNum = db.hasNpsResult ? "⑥" : "⑤";
  if (!db.pumps || !db.pumps.length) {
    return `<div class="section">
      <div class="head s5">${pumpNum} Pump 추천</div>
      <div class="body"><div class="empty">설계도에서 양정을 계산할 수 있는 펌프가 없습니다.</div></div>
    </div>`;
  }
  return `<div class="section">
    <div class="head s5">${pumpNum} Pump 추천</div>
    <div class="body">
      <p class="desc">펌프의 BEP(Best Efficiency Point)는 H와 Q로 결정됩니다.
      Hardy-Cross로 배관별 유량·최적 직경이 확정된 뒤 펌프별 H_total·Q를 산출합니다.
      펌프의 개수와 타입을 선택하면 동원펌프 BEP 데이터(dongwonpump.json)와 비교해 가장 가까운 모델을 추천합니다.</p>
      <div id="pumpCards"></div>
      <div class="hint" id="pumpDbNote"></div>
    </div>
  </div>`;
}

/* initNominalSection은 hardycross_design.html의 "NPS+HC" 버튼으로 대체됨 — 빈 함수 유지 */
function initNominalSection(db){ /* no-op */ }

/* ============================================================
   ⑤ Pump 추천 — 이벤트 바인딩
   ============================================================ */
function initPumpSection(db){
  if (!db.pumps || !db.pumps.length) return;
  const cardsBox = document.getElementById("pumpCards");
  const noteBox  = document.getElementById("pumpDbNote");

  fetch("dongwonpump.json").then(r=> r.ok ? r.json() : null).then(catalog=>{
    if (!catalog) { noteBox.textContent = "dongwonpump.json 로드 실패 — 같은 폴더에 파일이 있는지 확인해주세요."; }
    cardsBox.innerHTML = db.pumps.map((p,idx)=> pumpCardHTML(p, idx)).join("");
    db.pumps.forEach((p, idx)=> wirePumpCard(p, idx, catalog));
  }).catch(()=>{ noteBox.textContent = "dongwonpump.json 로드 실패."; });
}

function pumpCardHTML(p, idx){
  const kindLabel = p.kind === "external" ? "🔌 외부 펌프 (화살표 연결)" : "🔧 내부 펌프 (배관 지정 영역)";
  return `<div class="pumpCard">
    <h4>${kindLabel} — 노드 N${p.nodeId}</h4>
    <div class="row"><label>요구 양정 H_total</label><span>${fmt(p.H_total,3)} m</span></div>
    <div class="row"><label>유량 Q</label><span>${(+p.Q).toExponential(3)} m³/s (${(+p.Q*60).toFixed(3)} m³/min)</span></div>
    <div class="row"><label>H_total × Q</label><span>${fmt(p.HQ,4)} m·m³/s</span></div>
    <div class="row"><label>펌프 개수</label><input type="number" min="1" step="1" value="1" id="pp-count-${idx}" style="width:70px"/></div>
    <div class="row"><label>펌프 타입</label>
      <select id="pp-type-${idx}">
        <option value="booster">🔧 가압용 (booster)</option>
        <option value="supply">💧 급수용 (supply)</option>
      </select>
    </div>
    <div class="row" style="align-items:flex-start"><label>분배된 운전점</label><span id="pp-point-${idx}">-</span></div>
    <div id="pp-rec-${idx}"></div>
  </div>`;
}

function wirePumpCard(p, idx, catalog){
  const countEl = document.getElementById(`pp-count-${idx}`);
  const typeEl  = document.getElementById(`pp-type-${idx}`);
  const pointEl = document.getElementById(`pp-point-${idx}`);
  const recEl   = document.getElementById(`pp-rec-${idx}`);

  function update(){
    const count = Math.max(1, parseInt(countEl.value, 10) || 1);
    const Q_each = p.Q / count;
    const H_each = p.H_total;
    pointEl.textContent = `대당 — Q ≈ ${(Q_each*60).toFixed(3)} m³/min, H ≈ ${H_each.toFixed(3)} m  (총 ${count}대 병렬 운전 가정)`;

    if (!catalog) { recEl.innerHTML = `<div class="hint">펌프 카탈로그를 불러오지 못했습니다.</div>`; return; }
    const type = typeEl.value;
    const candidates = Object.keys(catalog)
      .map(key => ({ key, ...catalog[key] }))
      .filter(c => c.category === type && c.bep_estimated && isFinite(c.bep_estimated.Q_m3min) && isFinite(c.bep_estimated.H_m));

    if (!candidates.length) { recEl.innerHTML = `<div class="hint">선택한 타입의 BEP 데이터가 없습니다.</div>`; return; }

    const ranked = candidates.map(c=>{
      const dQ = (c.bep_estimated.Q_m3min - Q_each*60) / (Q_each*60);
      const dH = (c.bep_estimated.H_m - H_each) / H_each;
      return { ...c, dist: Math.sqrt(dQ*dQ + dH*dH) };
    }).sort((a,b)=> a.dist - b.dist).slice(0, 5);

    recEl.innerHTML = `<table style="margin-top:6px">
      <tr><th>순위</th><th>모델</th><th>시리즈</th><th>출력</th><th>BEP (Q, H)</th><th>상대거리</th></tr>
      ${ranked.map((c,i)=> `<tr>
        <td>${i+1}${i===0?' <span class="pill good">추천</span>':''}</td>
        <td>${c.key}</td><td>${c.series||'-'}</td>
        <td>${c.power_kW!=null?c.power_kW+' kW':(c.power_HP!=null?c.power_HP+' HP':'-')}</td>
        <td>${fmt(c.bep_estimated.Q_m3min,3)} m³/min, ${fmt(c.bep_estimated.H_m,2)} m</td>
        <td>${(c.dist*100).toFixed(1)} %</td>
      </tr>`).join("")}
    </table>`;
  }

  countEl.addEventListener("input", update);
  typeEl.addEventListener("change", update);
  update();
}
</script>
